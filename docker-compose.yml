services:
  frontend:
    container_name: ketkereken_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - api
    ports:
      - "8090:80"
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: ketkereken_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: ketkereken
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppw
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ketkereken_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"

  api:
    container_name: ketkereken_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
